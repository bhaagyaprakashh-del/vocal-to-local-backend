<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Onboarding | Vocal to Local</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        h3 { font-size: 1.6rem; margin-bottom: 10px; color: #10b981; font-weight: 700; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { border-color: #10b981; }
        .submit-btn { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
        .submit-btn:hover { background: #059669; }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #10b981; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Seller Enrollment</h3>
        <p>Onboard your local shop/business into your neighborhood profile</p>
        <form id="sellerForm" onsubmit="submitForm(event)">
            <div class="form-group"><label>Full Name</label><input type="text" id="name" required placeholder="Rajesh Kumar"></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="email" required placeholder="rajesh@example.com"></div>
            <div class="form-group"><label>Phone Number</label><input type="text" id="phone" required placeholder="9876543210"></div>
            
            <!-- Added Area Dropdown Selection Box -->
            <div class="form-group">
                <label>Select Operating Area / Pincode</label>
                <select id="area_select" required>
                    <option value="" disabled selected>Loading locations...</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Register as Vendor</button>
        </form>
        <a href="/" class="back-link">← Back to Homepage</a>
    </div>

    <script>
        // Dynamically fetch live operational areas from your PostgreSQL database
        async function fetchAvailableAreas() {
            const dropdown = document.getElementById('area_select');
            try {
                const response = await fetch('/areas/');
                const areas = await response.json();
                dropdown.innerHTML = '';
                
                if (areas.length === 0) {
                    dropdown.innerHTML = '<option value="" disabled>No active areas found. Add via /docs first!</option>';
                    return;
                }
                
                dropdown.innerHTML = '<option value="" disabled selected>-- Choose your Area --</option>';
                areas.forEach(area => {
                    dropdown.innerHTML += `<option value="${area.id}">${area.area_name} (${area.pincode})</option>`;
                });
            } catch (error) {
                dropdown.innerHTML = '<option value="" disabled>Error loading database areas.</option>';
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            const selectedAreaId = document.getElementById('area_select').value;
            
            const payload = {
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phone').value,
                role: 'vendor',
                area_id: selectedAreaId ? parseInt(selectedAreaId) : null
            };
            try {
                const response = await fetch('/users/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Vendor Account Created Successfully! Proceed to link store details in the next phase.');
                    window.location.href = '/';
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (error) {
                alert('Could not connect to registration server.');
            }
        }

        // Trigger loading when page launches
        fetchAvailableAreas();
    </script>
</body>
</html>
