<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Onboarding | Vocal to Local</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        h3 { font-size: 1.8rem; margin-bottom: 10px; color: #10b981; font-weight: 700; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }
        .section-divider { font-size: 1rem; font-weight: 700; color: #4f46e5; text-align: left; margin: 25px 0 15px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { border-color: #10b981; }
        .submit-btn { width: 100%; background: #10b981; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1.05rem; transition: 0.2s; box-shadow: 0 4px 12px rgba(16,185,129,0.2); margin-top: 15px; }
        .submit-btn:hover { background: #059669; }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #10b981; }
    </style>

    <!-- 🚀 CRITICAL FIX: Script moved to Head so the browser reads functions first -->
    <script>
        // 🕒 GPS Real-Time Address Resolver Engine
        function detectGPSLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser software.");
                return;
            }

            alert("Fetching your precise shop coordinates. Please allow location permissions if prompted...");

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                try {
                    const response = await fetch(`https://openstreetmap.org{lat}&lon=${lon}&format=json&addressdetails=1`, {
                        headers: {
                            'User-Agent': 'VocalToLocalMarketplace/1.0 (contact: support@vocaltolocal.co.in)'
                        }
                    });
                    const data = await response.json();

                    if (data && data.address) {
                        const addr = data.address;

                        // Smart Address Hierarchy Mapping logic for regional Indian parameters
                        const subLocality = addr.suburb || addr.neighbourhood || addr.village || addr.commercial || "";
                        const taluka = addr.subdistrict || ""; 
                        const city = addr.city || addr.town || addr.city_district || "Pune";
                        const district = addr.county || addr.district || "Pune District";
                        const state = addr.state || "Maharashtra";
                        const pincode = addr.postcode || "";

                        // Update field values cleanly
                        if (document.getElementById('street')) {
                            document.getElementById('street').value = data.display_name.split(',').slice(0, 3).join(',').trim();
                        }
                        if (document.getElementById('area')) {
                            document.getElementById('area').value = taluka ? `${subLocality} (Taluka: ${taluka})`.trim() : subLocality;
                        }
                        if (document.getElementById('pincode')) {
                            document.getElementById('pincode').value = pincode;
                        }
                        if (document.getElementById('city')) {
                            document.getElementById('city').value = city;
                        }
                        if (document.getElementById('district')) {
                            document.getElementById('district').value = district;
                        }
                        if (document.getElementById('state')) {
                            document.getElementById('state').value = state;
                        }

                        alert("Shop location details successfully resolved and filled!");
                    }
                } catch (error) {
                    alert("Unable to fetch address string details from the mapping service.");
                }
            }, (error) => {
                alert("GPS location request denied or timed out. Please input details manually.");
            }, { enableHighAccuracy: true });
        }

        // Onboarding form API submission workflow handler
        async function submitForm(event) {
            event.preventDefault();
            
            const fullAddressString = `${document.getElementById('street').value}, ${document.getElementById('district').value}, ${document.getElementById('state').value}`;
            
            const complexPayload = {
                full_name: document.getElementById('owner_name').value,
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phone').value,
                business_name: document.getElementById('biz_name').value,
                category: document.getElementById('biz_category').value,
                gst_number: document.getElementById('gst_number').value.trim().toUpperCase() || null, 
                detailed_address: fullAddressString,
                area_name: document.getElementById('area').value,
                pincode: document.getElementById('pincode').value,
                city: document.getElementById('city').value
            };

            try {
                const response = await fetch('/onboard-vendor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(complexPayload)
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('Congratulations! Vendor Account and Business Profile are fully live.');
                    window.location.href = '/';
                } else {
                    alert('Registration Failed: ' + data.detail);
                }
            } catch (error) {
                alert('Could not connect to the vendor deployment server.');
            }
        }
    </script>
</head>
<body>
    <div class="card">
        <h3>Seller Enrollment</h3>
        <p>Register your profile and map your business address details directly</p>
        
        <form id="sellerForm" onsubmit="submitForm(event)">
            <!-- 👤 Part 1: Personal Details -->
            <div class="section-divider">👤 Personal Details</div>
            <div class="form-group"><label>Owner Full Name</label><input type="text" id="owner_name" required placeholder="Rajesh Kumar"></div>
            <div class="form-row">
                <div class="form-group"><label>Email Address</label><input type="email" id="email" required placeholder="rajesh@example.com"></div>
                <div class="form-group"><label>Phone Number</label><input type="text" id="phone" required placeholder="9876543210"></div>
            </div>

            <!-- 🏪 Part 2: Business Details -->
            <div class="section-divider">🏪 Business Info</div>
            <div class="form-group"><label>Business / Shop Name</label><input type="text" id="biz_name" required placeholder="Rajesh Kirana & General Store"></div>
            
            <div class="form-group">
                <label>Business Category</label>
                <select id="biz_category" required>
                    <option value="" disabled selected>-- Select Category --</option>
                    <option value="Grocery">Grocery / Kirana</option>
                    <option value="Dairy">Dairy Products</option>
                    <option value="Fruits & Vegetables">Fruits & Vegetables</option>
                    <option value="Clothing">Clothing & Apparel</option>
                    <option value="Pharmacy">Pharmacy / Medical Store</option>
                    <option value="Electronics">Electronics & Repairs</option>
                </select>
            </div>

            <div class="form-group">
                <label>GSTIN / GST Number (Optional)</label>
                <input type="text" id="gst_number" placeholder="27AAAAA0000A1Z5" maxlength="15" style="text-transform: uppercase; letter-spacing: 1px;">
            </div>

            <!-- 📍 Part 3: Detailed Address Mapping -->
            <div class="section-divider">📍 Shop Address Details</div>
            
            <!-- 📍 Smart Location Assistance Wrapper Component -->
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
