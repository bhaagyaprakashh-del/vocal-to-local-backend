<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Catalog Management | Vocal to Local</title>
    <link href="https://googleapis.com" rel="preconnect">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; color: #1e293b; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header-box { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(16,185,129,0.1); }
        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; height: fit-content; }
        h3 { font-size: 1.2rem; margin-bottom: 20px; color: #0f172a; border-left: 4px solid #10b981; padding-left: 10px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 0.95rem; }
        .form-group input:focus, .form-group textarea:focus { border-color: #10b981; }
        .submit-btn { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .submit-btn:hover { background: #059669; }
        .product-list { display: flex; flex-direction: column; gap: 15px; }
        .product-item { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .prod-info h4 { font-size: 1rem; color: #0f172a; }
        .prod-info p { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
        .prod-price { font-weight: 700; color: #10b981; font-size: 1.1rem; }
        .no-products { text-align: center; color: #64748b; font-size: 0.95rem; padding: 20px 0; }
        .back-link { display: inline-block; margin-top: 20px; color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .back-link:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>🏪 Shop Catalog Dashboard</h2>
            <p>Manage your daily inventory and customer-facing weekday prices</p>
            <a href="/" class="back-link">← Back to Marketplace Home</a>
        </div>

        <div class="dashboard-grid">
            <!-- ➕ Left Side: Add Product Form -->
            <div class="card">
                <h3>Add New Product</h3>
                <form id="productForm" onsubmit="addProduct(event)">
                    <div class="form-group">
                        <label>Business ID</label>
                        <input type="number" id="business_id" required placeholder="Enter your Business ID">
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="product_name" required placeholder="e.g., Premium Basmati Rice">
                    </div>
                    <div class="form-group">
                        <label>Short Description</label>
                        <textarea id="description" rows="2" placeholder="e.g., Long grain, 5kg pack"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Regular Price (₹)</label>
                        <input type="number" step="0.01" id="regular_price" required placeholder="e.g., 450">
                    </div>
                    <button type="submit" class="submit-btn">List Item In Store</button>
                </form>
            </div>

            <!-- 📦 Right Side: Live Catalog Viewer -->
            <div class="card">
                <h3>Active Store Catalog</h3>
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <input type="number" id="search_biz_id" placeholder="Enter Business ID to fetch" style="flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none;">
                    <button onclick="loadCatalog()" style="background: #0f172a; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer;">Fetch</button>
                </div>
                <div class="product-list" id="catalogContainer">
                    <div class="no-products">Enter your unique Business ID above to view your listed digital storefront products.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ➕ Action A: Send new product to FastAPI database session
        async function addProduct(event) {
            event.preventDefault();
            
            const payload = {
                business_id: parseInt(document.getElementById('business_id').value),
                product_name: document.getElementById('product_name').value.trim(),
                description: document.getElementById('description').value.trim() || null,
                regular_price: parseFloat(document.getElementById('regular_price').value)
            };

            try {
                const response = await fetch('/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Success: Product added to your digital storefront!');
                    document.getElementById('productForm').reset();
                    document.getElementById('search_biz_id').value = payload.business_id;
                    loadCatalog(); // Refresh view automatically
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (error) {
                alert('Could not connect to the catalog server.');
            }
        }

        // 🔍 Action B: Fetch active products list from database
        async function loadCatalog() {
            const bizId = document.getElementById('search_biz_id').value.trim();
            const container = document.getElementById('catalogContainer');
            
            if (!bizId) {
                alert('Please enter a Business ID.');
                return;
            }

            container.innerHTML = '<div class="no-products">Fetching items...</div>';

            try {
                const response = await fetch(`/catalog/${bizId}`);
                const products = await response.json();

                container.innerHTML = '';

                if (!response.ok || products.length === 0) {
                    container.innerHTML = '<div class="no-products">❌ No active products listed for this shop ID yet.</div>';
                    return;
                }

                products.forEach(prod => {
                    const item = document.createElement('div');
                    item.className = 'product-item';
                    item.innerHTML = `
                        <div class="prod-info">
                            <h4>${prod.product_name}</h4>
                            <p>${prod.description || 'No description provided'}</p>
                        </div>
                        <div class="prod-price">₹${prod.regular_price}</div>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = '<div class="no-products">⚠️ Error connecting to server.</div>';
            }
        }
    </script>
</body>
</html>
