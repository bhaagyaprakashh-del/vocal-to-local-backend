<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Registration | Vocal to Local</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        h3 { font-size: 1.6rem; margin-bottom: 10px; color: #4f46e5; font-weight: 700; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-size: 0.95rem; }
        .form-group input:focus { border-color: #4f46e5; }
        .submit-btn { width: 100%; background: #4f46e5; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .submit-btn:hover { background: #4338ca; }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Buyer Enrollment</h3>
        <p>Register as a local customer to find nearby shops</p>
        <form id="buyerForm" onsubmit="submitForm(event)">
            <div class="form-group"><label>Full Name</label><input type="text" id="name" required placeholder="John Doe"></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="email" required placeholder="john@example.com"></div>
            <div class="form-group"><label>Phone Number</label><input type="text" id="phone" required placeholder="9876543210"></div>
            <button type="submit" class="submit-btn">Register as Buyer</button>
        </form>
        <a href="/" class="back-link">← Back to Homepage</a>
    </div>

    <script>
        async function submitForm(event) {
            event.preventDefault();
            const payload = {
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phone').value,
                role: 'customer',
                area_id: null
            };
            try {
                const response = await fetch('/users/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Registration Successful!');
                    window.location.href = '/';
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (error) {
                alert('Could not connect to registration server.');
            }
        }
    </script>
</body>
</html>
